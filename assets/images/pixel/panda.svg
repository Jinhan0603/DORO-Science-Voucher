<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="64" height="64">
  <!-- Panda face: black ears, white face, black eye patches, pink nose, pink cheeks -->

  <!-- Left ear (black) -->
  <rect x="1" y="1" width="3" height="3" fill="#1a1a1a"/>
  <!-- Right ear (black) -->
  <rect x="12" y="1" width="3" height="3" fill="#1a1a1a"/>

  <!-- White face base -->
  <rect x="2" y="3" width="12" height="10" fill="#f0f0f0"/>
  <rect x="1" y="4" width="14" height="8" fill="#f0f0f0"/>
  <rect x="2" y="13" width="12" height="1" fill="#f0f0f0"/>

  <!-- Left eye patch (black) -->
  <rect x="2" y="5" width="4" height="3" fill="#1a1a1a"/>
  <!-- Right eye patch (black) -->
  <rect x="10" y="5" width="4" height="3" fill="#1a1a1a"/>

  <!-- Left eye white -->
  <rect x="3" y="6" width="2" height="2" fill="#f0f0f0"/>
  <!-- Right eye white -->
  <rect x="11" y="6" width="2" height="2" fill="#f0f0f0"/>

  <!-- Left pupil -->
  <rect x="3" y="6" width="1" height="1" fill="#1a1a1a"/>
  <!-- Right pupil -->
  <rect x="12" y="6" width="1" height="1" fill="#1a1a1a"/>

  <!-- Left eye shine -->
  <rect x="4" y="6" width="1" height="1" fill="#f0f0f0"/>
  <!-- Right eye shine -->
  <rect x="13" y="6" width="1" height="1" fill="#f0f0f0"/>

  <!-- Pink cheeks -->
  <rect x="2" y="9" width="2" height="2" fill="#F472B6" fill-opacity="0.5"/>
  <rect x="12" y="9" width="2" height="2" fill="#F472B6" fill-opacity="0.5"/>

  <!-- Nose (pink) -->
  <rect x="7" y="10" width="2" height="1" fill="#F472B6"/>

  <!-- Mouth -->
  <rect x="6" y="11" width="1" height="1" fill="#1a1a1a"/>
  <rect x="9" y="11" width="1" height="1" fill="#1a1a1a"/>
  <rect x="7" y="12" width="2" height="1" fill="#1a1a1a"/>

</svg>
