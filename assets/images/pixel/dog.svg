<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="64" height="64">
  <!-- Dog face: warm brown, floppy ears, big black nose, tongue out -->

  <!-- Floppy left ear (dark brown) -->
  <rect x="0" y="3" width="3" height="7" fill="#92400E"/>
  <!-- Floppy right ear (dark brown) -->
  <rect x="13" y="3" width="3" height="7" fill="#92400E"/>

  <!-- Face base (warm tan) -->
  <rect x="2" y="2" width="12" height="11" fill="#D97706"/>
  <rect x="1" y="3" width="14" height="9" fill="#D97706"/>
  <rect x="2" y="13" width="12" height="1" fill="#D97706"/>

  <!-- Forehead patch (lighter) -->
  <rect x="3" y="2" width="10" height="3" fill="#F59E0B"/>

  <!-- Left eye -->
  <rect x="3" y="5" width="3" height="3" fill="#1a1a1a"/>
  <!-- Right eye -->
  <rect x="10" y="5" width="3" height="3" fill="#1a1a1a"/>

  <!-- Eye whites/shine left -->
  <rect x="3" y="5" width="1" height="1" fill="#f0f0f0"/>
  <!-- Eye whites/shine right -->
  <rect x="10" y="5" width="1" height="1" fill="#f0f0f0"/>

  <!-- Snout area (lighter tan) -->
  <rect x="4" y="9" width="8" height="4" fill="#F59E0B"/>

  <!-- Big black nose -->
  <rect x="5" y="9" width="6" height="2" fill="#1a1a1a"/>
  <!-- Nose highlight -->
  <rect x="6" y="9" width="2" height="1" fill="#64748B"/>

  <!-- Nostrils -->
  <rect x="5" y="10" width="2" height="1" fill="#1a1a1a"/>
  <rect x="9" y="10" width="2" height="1" fill="#1a1a1a"/>

  <!-- Mouth line -->
  <rect x="7" y="11" width="2" height="1" fill="#92400E"/>

  <!-- Tongue (pink, sticking out) -->
  <rect x="6" y="12" width="4" height="2" fill="#F472B6"/>
  <!-- Tongue center line -->
  <rect x="7" y="12" width="2" height="2" fill="#EC4899"/>
  <!-- Tongue bottom curve -->
  <rect x="6" y="14" width="1" height="1" fill="#F472B6"/>
  <rect x="9" y="14" width="1" height="1" fill="#F472B6"/>

</svg>
