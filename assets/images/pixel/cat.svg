<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="64" height="64">
  <!-- Cat face: amber/orange fur, pointed ears, big teal eyes, pink nose, whiskers -->

  <!-- Left ear (amber outer) -->
  <rect x="1" y="1" width="3" height="4" fill="#F59E0B"/>
  <!-- Left ear inner (pink) -->
  <rect x="2" y="2" width="1" height="2" fill="#F472B6"/>

  <!-- Right ear (amber outer) -->
  <rect x="12" y="1" width="3" height="4" fill="#F59E0B"/>
  <!-- Right ear inner (pink) -->
  <rect x="13" y="2" width="1" height="2" fill="#F472B6"/>

  <!-- Face base (amber) -->
  <rect x="2" y="4" width="12" height="9" fill="#F59E0B"/>
  <rect x="1" y="5" width="14" height="7" fill="#F59E0B"/>
  <rect x="2" y="13" width="12" height="1" fill="#F59E0B"/>

  <!-- Left eye (teal) -->
  <rect x="3" y="6" width="4" height="3" fill="#14B8A6"/>
  <!-- Right eye (teal) -->
  <rect x="9" y="6" width="4" height="3" fill="#14B8A6"/>

  <!-- Left pupil (black vertical slit) -->
  <rect x="5" y="6" width="1" height="3" fill="#1a1a1a"/>
  <!-- Right pupil (black vertical slit) -->
  <rect x="11" y="6" width="1" height="3" fill="#1a1a1a"/>

  <!-- Eye shine left -->
  <rect x="3" y="6" width="1" height="1" fill="#f0f0f0"/>
  <!-- Eye shine right -->
  <rect x="9" y="6" width="1" height="1" fill="#f0f0f0"/>

  <!-- Nose (pink) -->
  <rect x="7" y="10" width="2" height="1" fill="#F472B6"/>
  <rect x="8" y="9" width="1" height="1" fill="#F472B6"/>

  <!-- Mouth -->
  <rect x="6" y="11" width="1" height="1" fill="#1a1a1a"/>
  <rect x="9" y="11" width="1" height="1" fill="#1a1a1a"/>
  <rect x="7" y="12" width="2" height="1" fill="#1a1a1a"/>

  <!-- Whiskers left -->
  <rect x="1" y="10" width="3" height="1" fill="#1a1a1a" fill-opacity="0.4"/>
  <rect x="0" y="11" width="4" height="1" fill="#1a1a1a" fill-opacity="0.4"/>

  <!-- Whiskers right -->
  <rect x="12" y="10" width="3" height="1" fill="#1a1a1a" fill-opacity="0.4"/>
  <rect x="12" y="11" width="4" height="1" fill="#1a1a1a" fill-opacity="0.4"/>

</svg>
