<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="64" height="64">
  <!-- Frog face: green, big eyes on top, wide mouth, cute -->

  <!-- Left eye bump (on top of head) -->
  <rect x="1" y="1" width="4" height="4" fill="#16A34A"/>
  <rect x="0" y="2" width="5" height="3" fill="#16A34A"/>

  <!-- Right eye bump (on top of head) -->
  <rect x="11" y="1" width="4" height="4" fill="#16A34A"/>
  <rect x="11" y="2" width="5" height="3" fill="#16A34A"/>

  <!-- Left eye white -->
  <rect x="1" y="1" width="3" height="3" fill="#f0f0f0"/>
  <!-- Right eye white -->
  <rect x="12" y="1" width="3" height="3" fill="#f0f0f0"/>

  <!-- Left pupil -->
  <rect x="2" y="2" width="2" height="2" fill="#1a1a1a"/>
  <!-- Right pupil -->
  <rect x="12" y="2" width="2" height="2" fill="#1a1a1a"/>

  <!-- Eye shine left -->
  <rect x="2" y="2" width="1" height="1" fill="#f0f0f0" fill-opacity="0.5"/>
  <!-- Eye shine right -->
  <rect x="12" y="2" width="1" height="1" fill="#f0f0f0" fill-opacity="0.5"/>

  <!-- Face base (green) -->
  <rect x="1" y="4" width="14" height="9" fill="#22C55E"/>
  <rect x="2" y="3" width="12" height="11" fill="#22C55E"/>

  <!-- Belly/chin (lighter green) -->
  <rect x="3" y="9" width="10" height="5" fill="#4ADE80"/>
  <rect x="2" y="10" width="12" height="3" fill="#4ADE80"/>

  <!-- Nostrils (dark dots) -->
  <rect x="6" y="6" width="1" height="1" fill="#15803D"/>
  <rect x="9" y="6" width="1" height="1" fill="#15803D"/>

  <!-- Wide smile (dark green line) -->
  <rect x="3" y="8" width="10" height="1" fill="#15803D"/>
  <rect x="2" y="9" width="1" height="1" fill="#15803D"/>
  <rect x="13" y="9" width="1" height="1" fill="#15803D"/>

  <!-- Teeth (white) -->
  <rect x="5" y="9" width="2" height="1" fill="#f0f0f0"/>
  <rect x="9" y="9" width="2" height="1" fill="#f0f0f0"/>

  <!-- Chin bottom round -->
  <rect x="3" y="14" width="10" height="1" fill="#22C55E"/>

</svg>
