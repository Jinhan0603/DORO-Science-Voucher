<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="64" height="64">
  <!-- Cute pixel car - side view, teal body -->

  <!-- Car body bottom (teal) -->
  <rect x="1" y="9" width="14" height="4" fill="#14B8A6"/>

  <!-- Car roof/cab (teal, narrower) -->
  <rect x="3" y="5" width="9" height="5" fill="#14B8A6"/>

  <!-- Windshield (light blue) -->
  <rect x="4" y="6" width="4" height="3" fill="#67E8F9"/>
  <!-- Rear window -->
  <rect x="9" y="6" width="2" height="3" fill="#67E8F9"/>

  <!-- Window frames (dark teal) -->
  <rect x="4" y="5" width="4" height="1" fill="#0D9488"/>
  <rect x="9" y="5" width="2" height="1" fill="#0D9488"/>

  <!-- Car body detail (darker stripe) -->
  <rect x="1" y="10" width="14" height="1" fill="#0D9488"/>

  <!-- Hood (front, right side) -->
  <rect x="12" y="7" width="3" height="2" fill="#14B8A6"/>

  <!-- Headlights (amber) -->
  <rect x="14" y="8" width="1" height="1" fill="#F59E0B"/>
  <!-- Tail lights (pink) -->
  <rect x="1" y="8" width="1" height="1" fill="#F472B6"/>

  <!-- Door line -->
  <rect x="7" y="9" width="1" height="4" fill="#0D9488"/>

  <!-- Front wheel well -->
  <rect x="11" y="12" width="4" height="1" fill="#0B1528"/>
  <!-- Rear wheel well -->
  <rect x="1" y="12" width="4" height="1" fill="#0B1528"/>

  <!-- Front wheel -->
  <rect x="11" y="12" width="4" height="3" fill="#1a1a1a"/>
  <rect x="12" y="13" width="2" height="1" fill="#64748B"/>
  <!-- Rear wheel -->
  <rect x="1" y="12" width="4" height="3" fill="#1a1a1a"/>
  <rect x="2" y="13" width="2" height="1" fill="#64748B"/>

  <!-- Bumpers -->
  <rect x="14" y="9" width="2" height="3" fill="#64748B"/>
  <rect x="0" y="9" width="1" height="3" fill="#64748B"/>

  <!-- Antenna -->
  <rect x="11" y="2" width="1" height="4" fill="#64748B"/>

</svg>
