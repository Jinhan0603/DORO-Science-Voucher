<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" width="32" height="32">
  <!-- 8x8 pixel art sword (diagonal, tip top-right to handle bottom-left) -->

  <!-- Blade tip (white/bright) -->
  <rect x="7" y="0" width="1" height="1" fill="#f0f0f0"/>

  <!-- Blade body (white/gray, diagonal) -->
  <rect x="6" y="1" width="1" height="1" fill="#f0f0f0"/>
  <rect x="5" y="2" width="1" height="1" fill="#f0f0f0"/>
  <!-- Blade edge highlight -->
  <rect x="6" y="0" width="1" height="1" fill="#f0f0f0"/>
  <rect x="7" y="1" width="1" height="1" fill="#CBD5E1"/>

  <!-- Blade middle -->
  <rect x="4" y="3" width="1" height="1" fill="#CBD5E1"/>
  <rect x="5" y="3" width="1" height="1" fill="#f0f0f0"/>

  <!-- Crossguard (amber, horizontal) -->
  <rect x="2" y="4" width="4" height="1" fill="#F59E0B"/>
  <rect x="3" y="3" width="1" height="1" fill="#F59E0B"/>
  <rect x="3" y="5" width="1" height="1" fill="#D97706"/>

  <!-- Blade lower -->
  <rect x="3" y="4" width="1" height="1" fill="#CBD5E1"/>

  <!-- Handle/grip (dark brown) -->
  <rect x="2" y="5" width="1" height="1" fill="#92400E"/>
  <rect x="1" y="6" width="1" height="1" fill="#92400E"/>

  <!-- Pommel (amber circle) -->
  <rect x="0" y="6" width="2" height="2" fill="#F59E0B"/>
  <rect x="0" y="7" width="2" height="1" fill="#D97706"/>

  <!-- Blade shine line -->
  <rect x="6" y="2" width="1" height="1" fill="#f0f0f0" fill-opacity="0.6"/>

</svg>
