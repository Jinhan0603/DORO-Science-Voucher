<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" width="32" height="32">
  <!-- 8x8 pixel art star, amber color -->

  <!-- Top point -->
  <rect x="3" y="0" width="2" height="1" fill="#F59E0B"/>

  <!-- Upper body / diagonal arms -->
  <rect x="3" y="1" width="2" height="1" fill="#F59E0B"/>
  <rect x="0" y="2" width="8" height="1" fill="#F59E0B"/>

  <!-- Middle full row -->
  <rect x="1" y="3" width="6" height="1" fill="#F59E0B"/>

  <!-- Lower diagonals (v shape) -->
  <rect x="0" y="4" width="2" height="1" fill="#F59E0B"/>
  <rect x="6" y="4" width="2" height="1" fill="#F59E0B"/>

  <!-- Bottom left leg -->
  <rect x="0" y="5" width="1" height="1" fill="#F59E0B"/>
  <!-- Bottom right leg -->
  <rect x="7" y="5" width="1" height="1" fill="#F59E0B"/>

  <!-- Lower center -->
  <rect x="3" y="5" width="2" height="1" fill="#F59E0B"/>

  <!-- Bottom point -->
  <rect x="3" y="6" width="2" height="1" fill="#F59E0B"/>
  <rect x="4" y="7" width="1" height="1" fill="#F59E0B"/>

  <!-- Highlight (lighter amber) -->
  <rect x="3" y="1" width="1" height="1" fill="#FDE68A"/>
  <rect x="3" y="2" width="2" height="1" fill="#FDE68A"/>

</svg>
